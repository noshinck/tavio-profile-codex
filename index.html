<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NFC Business Card</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="profile-page">
    <div class="ambient-background" aria-hidden="true">
      <div class="ambient-orb one"></div>
      <div class="ambient-orb two"></div>
      <div class="ambient-orb three"></div>
    </div>

    <div class="page-shell">
      <main class="panel profile-panel">
        <section class="profile-block">
          <div class="identity-banner" id="profile-banner">
            <img class="banner-image" id="profile-banner-image" alt="" />
          </div>
          <div class="identity-avatar-wrap">
            <div class="avatar" id="profile-avatar">
              <img class="avatar-image" id="profile-avatar-image" alt="" />
              <span class="avatar-text" id="profile-avatar-text">NN</span>
            </div>
          </div>
          <div class="identity-stack">
            <h1 class="profile-name" id="profile-name">noshin naved ck</h1>
            <div class="role" id="profile-role-text">ceo</div>
            <div class="company identity-line is-empty" id="profile-company"></div>
            <div class="headline identity-line" id="profile-headline">Tap to save contact instantly.</div>
            <div class="location identity-line is-empty" id="profile-location"></div>
            <div class="skills-row" id="profile-skills" style="display: none;"></div>
          </div>
        </section>

        <a class="primary-button" id="save-contact-button" href="#">
          <span class="icon" id="save-contact-icon"></span>
          <span class="save-text">Save My Contact</span>
        </a>

        <div class="save-trust" id="save-trust">Safe • No app needed</div>
        <div class="save-helper" id="save-helper"></div>

        <div class="action-section" id="action-section">
          <div class="action-grid" id="action-grid"></div>
        </div>

        <div class="social-grid" id="social-grid"></div>

        <section class="share-back" id="share-back-section">
          <h2 class="share-title">Saved ✔ You&apos;re now connected</h2>
          <p class="share-note">Want me to save your contact too?</p>
          <form class="form share-form" id="share-back-form">
            <label class="field">
              <input class="input share-input" id="share-name" type="text" name="name" placeholder="Your name" required />
            </label>
            <label class="field">
              <input class="input share-input" id="share-phone" type="tel" name="phone" placeholder="Phone" required />
            </label>
            <label class="field">
              <input class="input share-input" id="share-email" type="email" name="email" placeholder="Email" required />
            </label>
            <button class="primary-button share-button" id="share-button" type="button">
              <span class="icon" id="share-button-icon"></span>
              <span>Share My Contact</span>
            </button>
            <div class="share-status" id="share-back-status"></div>
          </form>
          <div class="share-speed">Takes 5 seconds</div>
        </section>

        <div class="nav-buttons">
          <button class="action-button nav-button" id="go-to-edit" type="button">Edit Profile</button>
          <button class="action-button nav-button" id="go-to-analytics" type="button">View Analytics</button>
        </div>

        <div class="footer">ABCD123</div>
      </main>
    </div>

    <script>
      (function () {
        var icons = {
          download: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4v10"></path><path d="m8.5 10.5 3.5 3.5 3.5-3.5"></path><path d="M5 19h14"></path></svg>',
          phone: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.8 4h2.6l1.5 4-1.8 1.7a13.8 13.8 0 0 0 5.2 5.2l1.7-1.8 4 1.5v2.6a1.6 1.6 0 0 1-1.7 1.6A15.9 15.9 0 0 1 5.2 5.7 1.6 1.6 0 0 1 6.8 4Z"></path></svg>',
          email: '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="6.5" width="16" height="11" rx="2"></rect><path d="m5.5 8 6.5 5 6.5-5"></path></svg>',
          whatsapp: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20a8 8 0 1 0-4.5-1.4L5 20l1.5-2.4A8 8 0 0 0 12 20Z"></path><path d="M9.6 9.2c.3-.7.7-.7 1-.7h.3c.1 0 .3 0 .4.3l.9 2.1c.1.2 0 .3 0 .4l-.3.5c-.1.1-.2.2-.1.4.2.3.6.9 1.3 1.4.8.6 1.5.8 1.8.9.2.1.4 0 .5-.1l.6-.7c.1-.1.3-.1.4-.1l1.9.9c.2.1.3.2.3.3 0 .2-.1.9-.6 1.2-.4.3-.9.4-1.2.4-.3 0-.7.1-3.1-.8-2.8-1.1-4.6-3.9-4.7-4.1-.1-.2-.8-1-.8-2s.5-1.4.7-1.6Z"></path></svg>',
          instagram: '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4.5" y="4.5" width="15" height="15" rx="4"></rect><circle cx="12" cy="12" r="3.5"></circle><circle cx="17" cy="7" r="0.8" fill="currentColor" stroke="none"></circle></svg>',
          linkedin: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 9v8"></path><path d="M12 17v-4.5a2.5 2.5 0 0 1 5 0V17"></path><path d="M12 9v8"></path><circle cx="7" cy="6.8" r="1"></circle></svg>',
          twitter: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5 19 19"></path><path d="M19 5 5 19"></path></svg>',
          youtube: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12s0-3.2-.4-4.7a2.5 2.5 0 0 0-1.8-1.8C17.3 5 12 5 12 5s-5.3 0-6.8.5a2.5 2.5 0 0 0-1.8 1.8C3 8.8 3 12 3 12s0 3.2.4 4.7a2.5 2.5 0 0 0 1.8 1.8C6.7 19 12 19 12 19s5.3 0 6.8-.5a2.5 2.5 0 0 0 1.8-1.8C21 15.2 21 12 21 12Z"></path><path d="m10 9 5 3-5 3z"></path></svg>',
          facebook: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M13 20v-7h2.5l.5-3H13V8.3c0-.9.3-1.5 1.6-1.5H16V4.1c-.3 0-1.2-.1-2.3-.1-2.3 0-3.8 1.4-3.8 4V10H7v3h2.9v7"></path></svg>',
          website: '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8"></circle><path d="M4 12h16"></path><path d="M12 4a12 12 0 0 1 0 16"></path><path d="M12 4a12 12 0 0 0 0 16"></path></svg>',
          github: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 18c-4 1.2-4-2-5.5-2.5"></path><path d="M14.5 21v-3a2.6 2.6 0 0 0-.8-2c2.7-.3 5.5-1.3 5.5-6A4.7 4.7 0 0 0 18 6.8 4.3 4.3 0 0 0 17.9 4s-1 0-3.4 1.6a11.7 11.7 0 0 0-6 0C6.1 4 5.1 4 5.1 4A4.3 4.3 0 0 0 5 6.8 4.7 4.7 0 0 0 3.8 10c0 4.7 2.8 5.7 5.5 6a2.6 2.6 0 0 0-.8 2v3"></path></svg>',
          telegram: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 4-3 15-5-4-3 2 1-5 10-8-13 5 3 1"></path></svg>',
          snapchat: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4c2.6 0 4.5 2 4.5 4.7v2.1c0 .4.2.7.5.9.4.3 1 .6 1.5.7-.3.6-.9 1-1.7 1.2-.4.1-.6.4-.7.8-.2 1-.8 1.8-1.8 2.1-.7.2-1.3.3-2.3.3s-1.6-.1-2.3-.3c-1-.3-1.6-1.1-1.8-2.1-.1-.4-.3-.7-.7-.8-.8-.2-1.4-.6-1.7-1.2.5-.1 1.1-.4 1.5-.7.3-.2.5-.5.5-.9V8.7C7.5 6 9.4 4 12 4Z"></path></svg>',
          portfolio: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16v10H4z"></path><path d="M9 7V6a3 3 0 0 1 3-3h0a3 3 0 0 1 3 3v1"></path><path d="M4 11h16"></path></svg>'
        };

        var socialConfig = [
          { key: 'instagram', label: 'Instagram', icon: 'instagram' },
          { key: 'linkedin', label: 'LinkedIn', icon: 'linkedin' },
          { key: 'twitter', label: 'Twitter', icon: 'twitter' },
          { key: 'youtube', label: 'YouTube', icon: 'youtube' },
          { key: 'facebook', label: 'Facebook', icon: 'facebook' },
          { key: 'website', label: 'Website', icon: 'website' },
          { key: 'github', label: 'GitHub', icon: 'github' },
          { key: 'telegram', label: 'Telegram', icon: 'telegram' },
          { key: 'snapchat', label: 'Snapchat', icon: 'snapchat' },
          { key: 'portfolio', label: 'Portfolio', icon: 'portfolio' }
        ];

        var themeOptions = [
          { key: 'red', color: '#ef4444' },
          { key: 'blue', color: '#6f86ff' },
          { key: 'green', color: '#22c55e' },
          { key: 'purple', color: '#8b5cf6' },
          { key: 'orange', color: '#f97316' }
        ];

        var storageKeys = {
          profile: 'tavio_profile_static',
          sharedContacts: 'tavio_shared_contacts',
          views: 'tavio_views',
          saves: 'tavio_saves',
          clicks: 'tavio_clicks'
        };

        var defaultProfile = {
          name: 'noshin naved ck',
          role: 'ceo',
          headline: 'Tap to save contact instantly.',
          company: '',
          location: '',
          phone: '+91 98765 43210',
          email: 'noshin@example.com',
          profileInitial: '',
          profileImage: '',
          bannerImage: '',
          profileImageScale: 1,
          profileImageOffsetY: 0,
          skills: [],
          themeColor: 'blue',
          socials: {
            instagram: 'https://instagram.com/noshin',
            linkedin: 'https://linkedin.com/in/noshin',
            twitter: '',
            youtube: '',
            facebook: '',
            website: 'https://example.com',
            github: 'https://github.com/noshin',
            telegram: '',
            snapchat: '',
            portfolio: 'https://example.com/portfolio'
          }
        };

        function setIcon(id, iconName) {
          var element = document.getElementById(id);
          if (element) {
            element.innerHTML = icons[iconName] || '';
          }
        }

        function installTapFeedback() {
          var selector = '.primary-button, .action-button, .inline-button, .social-button, .color-dot, .chip-remove, .edit-trigger';
          var activeElement = null;

          function clearActive(target) {
            if (target) {
              target.classList.remove('tap-active');
            }
          }

          document.addEventListener('pointerdown', function (event) {
            var target = event.target.closest(selector);
            if (!target) {
              return;
            }
            clearActive(activeElement);
            activeElement = target;
            target.classList.add('tap-active');
          }, { passive: true });

          ['pointerup', 'pointercancel', 'pointerleave'].forEach(function (eventName) {
            document.addEventListener(eventName, function () {
              clearActive(activeElement);
              activeElement = null;
            }, { passive: true });
          });

          document.addEventListener('click', function (event) {
            var target = event.target.closest(selector);
            if (!target) {
              return;
            }
            target.classList.add('tap-active');
            window.clearTimeout(target.__tapTimer);
            target.__tapTimer = window.setTimeout(function () {
              target.classList.remove('tap-active');
            }, 160);
          });
        }

        function cloneProfile(profile) {
          return JSON.parse(JSON.stringify(profile));
        }

        function mergeProfile(stored) {
          var merged = cloneProfile(defaultProfile);
          var source = stored && typeof stored === 'object' ? stored : {};
          var key;
          for (key in source) {
            if (key !== 'socials' && key !== 'skills') {
              merged[key] = source[key];
            }
          }
          merged.skills = Array.isArray(source.skills) ? source.skills.slice() : [];
          merged.socials = cloneProfile(defaultProfile.socials);
          if (source.socials && typeof source.socials === 'object') {
            for (key in source.socials) {
              merged.socials[key] = source.socials[key];
            }
          }
          return merged;
        }

        function loadProfile() {
          try {
            return mergeProfile(JSON.parse(localStorage.getItem(storageKeys.profile) || '{}'));
          } catch (error) {
            return mergeProfile({});
          }
        }

        function incrementStat(key) {
          var currentValue = Number.parseInt(localStorage.getItem(key) || '0', 10);
          var nextValue = Number.isNaN(currentValue) ? 1 : currentValue + 1;
          localStorage.setItem(key, String(nextValue));
          return nextValue;
        }

        function deriveInitials(name) {
          return String(name || '')
            .trim()
            .split(/\s+/)
            .filter(Boolean)
            .slice(0, 2)
            .map(function (part) { return part.charAt(0).toUpperCase(); })
            .join('') || 'NN';
        }

        function hexToRgb(hex) {
          var normalized = String(hex || '').replace('#', '');
          var value = normalized.length === 3
            ? normalized.split('').map(function (char) { return char + char; }).join('')
            : normalized;
          var int = Number.parseInt(value, 16);
          if (Number.isNaN(int)) {
            return '111, 134, 255';
          }
          return [(int >> 16) & 255, (int >> 8) & 255, int & 255].join(', ');
        }

        function getThemeColor(themeName) {
          var match = themeOptions.find(function (item) {
            return item.key === themeName;
          });
          return match ? match.color : '#6f86ff';
        }

        function applyThemeToRoot(themeName) {
          var color = getThemeColor(themeName);
          document.documentElement.style.setProperty('--theme-accent', color);
          document.documentElement.style.setProperty('--theme-accent-rgb', hexToRgb(color));
        }

        function sanitizePhone(value) {
          return String(value || '').replace(/[^\d+]/g, '');
        }

        function buildVCard(profile) {
          return [
            'BEGIN:VCARD',
            'VERSION:3.0',
            'FN:' + (profile.name || ''),
            'TEL;TYPE=CELL:' + (profile.phone || ''),
            'EMAIL:' + (profile.email || ''),
            'TITLE:' + (profile.role || ''),
            'END:VCARD'
          ].join('\r\n');
        }

        function downloadVCard(profile) {
          var blob = new Blob([buildVCard(profile)], { type: 'text/vcard;charset=utf-8' });
          var url = URL.createObjectURL(blob);
          var link = document.createElement('a');
          var filename = (profile.name || 'contact').trim().toLowerCase().replace(/[^a-z0-9]+/g, '-') || 'contact';
          link.href = url;
          link.download = filename + '.vcf';
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(url);
        }

        function createActionButton(label, iconName, href, extraClass) {
          var className = 'action-button';
          if (extraClass) {
            className += ' ' + extraClass;
          }
          return '<a class="' + className + '" data-track-click="true" href="' + href + '">' +
            '<span class="icon">' + (icons[iconName] || '') + '</span>' +
            '<span>' + label + '</span>' +
            '</a>';
        }

        function createSocialButton(label, iconName, href) {
          return '<a class="social-button" data-track-click="true" href="' + href + '" target="_blank" rel="noopener noreferrer" aria-label="' + label + '" title="' + label + '">' +
            '<span class="icon">' + (icons[iconName] || '') + '</span>' +
            '</a>';
        }

        function renderActionButtons(profile) {
          var actionGrid = document.getElementById('action-grid');
          var actionSection = document.getElementById('action-section');
          if (!actionGrid || !actionSection) {
            return;
          }
          var phoneValue = sanitizePhone(profile.phone);
          var whatsappPhone = phoneValue.replace(/^\+/, '');
          actionGrid.innerHTML =
            createActionButton('Call', 'phone', 'tel:' + phoneValue, '') +
            createActionButton('Email', 'email', 'mailto:' + (profile.email || ''), '');
          var existingWhatsapp = actionSection.querySelector('.action-button.is-whatsapp');
          if (existingWhatsapp) {
            existingWhatsapp.remove();
          }
          actionSection.insertAdjacentHTML(
            'beforeend',
            createActionButton('WhatsApp', 'whatsapp', 'https://wa.me/' + whatsappPhone, 'is-whatsapp')
          );
        }

        function renderSocialButtons(profile) {
          var socialGrid = document.getElementById('social-grid');
          if (!socialGrid) {
            return;
          }
          var html = socialConfig
            .filter(function (item) { return profile.socials[item.key]; })
            .map(function (item) { return createSocialButton(item.label, item.icon, profile.socials[item.key]); })
            .join('');
          socialGrid.innerHTML = html;
          socialGrid.style.display = html ? 'grid' : 'none';
        }

        function updateMainProfile(profile) {
          var nameElement = document.getElementById('profile-name');
          var roleElement = document.getElementById('profile-role-text');
          var companyElement = document.getElementById('profile-company');
          var headlineElement = document.getElementById('profile-headline');
          var locationElement = document.getElementById('profile-location');
          var skillsElement = document.getElementById('profile-skills');
          var avatarElement = document.getElementById('profile-avatar');
          var avatarImageElement = document.getElementById('profile-avatar-image');
          var avatarTextElement = document.getElementById('profile-avatar-text');
          var bannerElement = document.getElementById('profile-banner');
          var bannerImageElement = document.getElementById('profile-banner-image');
          var initials = (profile.profileInitial || deriveInitials(profile.name)).slice(0, 2).toUpperCase();

          if (nameElement) { nameElement.textContent = profile.name || defaultProfile.name; }
          if (roleElement) { roleElement.textContent = profile.role || defaultProfile.role; }
          if (companyElement) {
            companyElement.textContent = profile.company || '';
            companyElement.classList.toggle('is-empty', !profile.company);
          }
          if (headlineElement) {
            headlineElement.textContent = profile.headline || '';
            headlineElement.classList.toggle('is-empty', !(profile.headline || '').trim());
          }
          if (locationElement) {
            locationElement.textContent = profile.location || '';
            locationElement.classList.toggle('is-empty', !profile.location);
          }
          if (skillsElement) {
            skillsElement.innerHTML = (profile.skills || []).map(function (skill) {
              return '<span class="skill-chip">' + skill + '</span>';
            }).join('');
            skillsElement.style.display = profile.skills && profile.skills.length ? 'flex' : 'none';
          }
          if (avatarTextElement) { avatarTextElement.textContent = initials; }
          if (avatarElement) { avatarElement.classList.toggle('has-image', Boolean(profile.profileImage)); }
          if (avatarImageElement) {
            if (profile.profileImage) {
              avatarImageElement.src = profile.profileImage;
            } else {
              avatarImageElement.removeAttribute('src');
            }
            avatarImageElement.style.setProperty('--avatar-scale', String(profile.profileImageScale || 1));
            avatarImageElement.style.setProperty('--avatar-offset-y', String(profile.profileImageOffsetY || 0) + 'px');
          }
          if (bannerElement) { bannerElement.classList.toggle('has-image', Boolean(profile.bannerImage)); }
          if (bannerImageElement) {
            if (profile.bannerImage) {
              bannerImageElement.src = profile.bannerImage;
            } else {
              bannerImageElement.removeAttribute('src');
            }
          }

          applyThemeToRoot(profile.themeColor || 'blue');
          renderActionButtons(profile);
          renderSocialButtons(profile);
        }

        function setSaveState(state) {
          var saveButton = document.getElementById('save-contact-button');
          var saveText = saveButton ? saveButton.querySelector('.save-text') : null;
          var saveTrust = document.getElementById('save-trust');
          var saveHelper = document.getElementById('save-helper');
          var shareSection = document.getElementById('share-back-section');

          if (!saveButton) {
            return;
          }

          saveButton.classList.remove('is-saving', 'is-saved');

          if (state === 'saving') {
            saveButton.classList.add('is-saving');
            if (saveText) {
              saveText.textContent = 'Saving...';
            }
            return;
          }

          if (state === 'saved') {
            saveButton.classList.add('is-saved');
            if (saveText) {
              saveText.textContent = 'Saved ✔';
            }
            if (saveTrust) {
              saveTrust.classList.add('is-hidden');
            }
            if (saveHelper) {
              saveHelper.classList.remove('is-hidden');
              saveHelper.textContent = 'Want me to save your contact too?';
            }
            if (shareSection) {
              shareSection.classList.add('is-visible');
            }
            return;
          }

          if (saveTrust) {
            saveTrust.classList.remove('is-hidden');
          }
          if (saveHelper) {
            saveHelper.classList.remove('is-hidden');
            saveHelper.textContent = '';
          }
          if (saveText) {
            saveText.textContent = 'Save My Contact';
          }
        }

        function saveSharedContact() {
          var shareStatus = document.getElementById('share-back-status');
          var shareForm = document.getElementById('share-back-form');
          var shareButton = document.getElementById('share-button');
          var name = document.getElementById('share-name').value.trim();
          var phone = document.getElementById('share-phone').value.trim();
          var email = document.getElementById('share-email').value.trim();
          var entries;

          if (!name || !phone || !email) {
            if (shareStatus) {
              shareStatus.textContent = 'Fill all fields';
            }
            return;
          }

          try {
            entries = JSON.parse(localStorage.getItem(storageKeys.sharedContacts) || '[]');
            if (!Array.isArray(entries)) {
              entries = [];
            }
          } catch (error) {
            entries = [];
          }

          if (shareButton) {
            shareButton.disabled = true;
          }

          entries.push({
            name: name,
            phone: phone,
            email: email,
            savedAt: new Date().toISOString()
          });

          localStorage.setItem(storageKeys.sharedContacts, JSON.stringify(entries));
          incrementStat(storageKeys.saves);

          if (shareStatus) {
            shareStatus.textContent = 'Saved ✅ You are now connected';
          }
          if (shareForm) {
            shareForm.reset();
          }
          if (shareButton) {
            shareButton.disabled = false;
          }
        }

        var savedProfile = loadProfile();
        var resetTimer = null;
        var saveButton = document.getElementById('save-contact-button');
        var shareButton = document.getElementById('share-button');
        var editPageButton = document.getElementById('go-to-edit');
        var analyticsPageButton = document.getElementById('go-to-analytics');

        setIcon('save-contact-icon', 'download');
        setIcon('share-button-icon', 'download');
        installTapFeedback();

        incrementStat(storageKeys.views);
        updateMainProfile(savedProfile);

        document.addEventListener('click', function (event) {
          var target = event.target.closest('[data-track-click="true"]');
          if (target) {
            incrementStat(storageKeys.clicks);
          }
        });

        if (saveButton) {
          saveButton.addEventListener('click', function (event) {
            event.preventDefault();
            if (resetTimer) {
              clearTimeout(resetTimer);
              resetTimer = null;
            }
            setSaveState('saving');
            try {
              incrementStat(storageKeys.saves);
              if (navigator.vibrate) {
                navigator.vibrate(18);
              }
              downloadVCard(savedProfile);
              setSaveState('saved');
              resetTimer = window.setTimeout(function () {
                setSaveState('idle');
              }, 1800);
            } catch (error) {
              setSaveState('idle');
            }
          });
        }

        if (shareButton) {
          shareButton.addEventListener('click', saveSharedContact);
        }

        if (editPageButton) {
          editPageButton.addEventListener('click', function () {
            window.location.href = 'edit.html';
          });
        }

        if (analyticsPageButton) {
          analyticsPageButton.addEventListener('click', function () {
            window.location.href = 'analytics.html';
          });
        }
      })();
    </script>
  </body>
</html>
